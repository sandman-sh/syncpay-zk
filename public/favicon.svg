<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Neobrutalist Shadow -->
  <rect x="8" y="8" width="48" height="48" rx="8" fill="#000000"/>
  <!-- Neobrutalist Foreground Card (Neo Green) -->
  <rect x="4" y="4" width="48" height="48" rx="8" fill="#55B468" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- White Shield Inside -->
  <path d="M28 38s7-3.5 7-8.75V20.25l-7-2.625-7 2.625v9c0 5.25 7 8.75 7 8.75z" fill="#FFFFFF" stroke="#000000" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Overlapping ZK Badge Shadow -->
  <rect x="33" y="33" width="23" height="15" fill="#000000"/>
  <!-- Overlapping ZK Badge Foreground (Black) -->
  <rect x="30" y="30" width="23" height="15" fill="#000000" stroke="#000000" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- ZK Text inside badge -->
  <text x="41.5" y="41" fill="#FFFFFF" font-family="'Space Grotesk', 'Inter', monospace" font-size="9" font-weight="bold" text-anchor="middle" letter-spacing="0.5">ZK</text>
